      .h2 { fill: #F7FBFF; font: 600 22px 'Avenir Next', 'Segoe UI', 'PingFang SC', sans-serif; }
      .label { fill: #F7FBFF; font: 600 16px 'Avenir Next', 'Segoe UI', 'PingFang SC', sans-serif; }
      .body { fill: #9FB2C9; font: 500 14px 'Avenir Next', 'Segoe UI', 'PingFang SC', sans-serif; }
      .caps { fill: #6F86A4; font: 700 12px 'Avenir Next', 'Segoe UI', 'PingFang SC', sans-serif; letter-spacing: 0.22em; }
      .metric { fill: #F5FAFF; font: 700 28px 'Avenir Next', 'Segoe UI', 'PingFang SC', sans-serif; }
      .small { fill: #D9E7F8; font: 600 13px 'Avenir Next', 'Segoe UI', 'PingFang SC', sans-serif; }
      .tiny { fill: #8AA0BC; font: 600 11px 'Avenir Next', 'Segoe UI', 'PingFang SC', sans-serif; letter-spacing: 0.08em; }
