  <text x="1334" y="824" class="small" fill="#07111C">Save AGENTS.md</text>

  <text x="746" y="892" class="body">Documentation preview: OpenClaw workspace with explorer folders, searchable memory files, multi-tab editing, and a focused right-side editor surface.</text>
