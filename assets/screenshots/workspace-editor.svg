  <rect x="746" y="446" width="710" height="334" rx="24" fill="#0B1624" stroke="#1A2D46"/>
  <text x="774" y="490" class="mono"># OpenClaw Agent Contract</text>
  <text x="774" y="530" class="mono-dim">## Role</text>
  <text x="774" y="562" class="mono">You coordinate provider selection, workspace memory,</text>
  <text x="774" y="594" class="mono">tool permissions and session continuity for this repo.</text>
  <text x="774" y="646" class="mono-dim">## File Responsibilities</text>
  <text x="774" y="678" class="mono">- AGENTS.md keeps operator instructions and guardrails</text>
  <text x="774" y="710" class="mono">- SOUL.md stores long-lived behavior and style defaults</text>
  <text x="774" y="742" class="mono">- TOOLS.md documents execution permissions and limits</text>

  <rect x="746" y="798" width="214" height="42" rx="16" fill="#122235"/>
